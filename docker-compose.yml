services:
  openclaw-claude:
    image: leorx/openclaw-claude:latest
    container_name: openclaw-claude
    restart: unless-stopped
    ports:
      - "18789:18789"   # OpenClaw gateway
      - "18790:18790"   # OpenClaw bridge
    volumes:
      - openclaw-data:/home/node/.openclaw
      - openclaw-plugins:/var/lib/openclaw/plugin-runtime-deps
      - claude-config:/home/node/.claude
    env_file:
      - .env

volumes:
  openclaw-data:
  openclaw-plugins:
  claude-config:
