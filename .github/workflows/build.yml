name: Build and push multi-arch image

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'versions.json'
  workflow_dispatch:
    inputs:
      claude_version:
        description: 'claude-code npm version to install (leave blank for latest)'
        required: false
        default: ''
  workflow_call:
    inputs:
      claude_version:
        description: 'claude-code npm version to install'
        required: false
        type: string
        default: ''

jobs:
  build:
    name: Build & push linux/amd64 + linux/arm64
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve claude-code version
        id: version
        run: |
          # Use input version, or fall back to versions.json, or fall back to latest
          INPUT_VER="${{ inputs.claude_version }}"
          JSON_VER=$(jq -r '.claude_code.version // ""' versions.json)
          CLAUDE_VERSION="${INPUT_VER:-${JSON_VER}}"
          echo "claude_version=$CLAUDE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Using claude-code version: ${CLAUDE_VERSION:-latest}"

      - name: Set up QEMU (for cross-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          DATE=$(date -u +"%Y.%m.%d")
          CLAUDE_VER="${{ steps.version.outputs.claude_version }}"
          OPENCLAW_DIGEST=$(jq -r '.openclaw.digest // "unknown"' versions.json | cut -c1-19)

          TAGS="leorx/openclaw-claude:latest"
          TAGS="$TAGS,leorx/openclaw-claude:${DATE}"

          if [ -n "$CLAUDE_VER" ]; then
            TAGS="$TAGS,leorx/openclaw-claude:claude-${CLAUDE_VER}"
          fi

          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Generated tags: $TAGS"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            CLAUDE_VERSION=${{ steps.version.outputs.claude_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=openclaw-claude
            org.opencontainers.image.description=OpenClaw + Claude CLI combined image
            org.opencontainers.image.source=https://github.com/LeoRX/openclaw-claude
            org.opencontainers.image.licenses=MIT

      - name: Update last_build timestamp in summary
        run: |
          echo "### Build complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`leorx/openclaw-claude\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Platforms** | linux/amd64, linux/arm64 |" >> $GITHUB_STEP_SUMMARY
          echo "| **claude-code** | \`${{ steps.version.outputs.claude_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tags** | \`${{ steps.tags.outputs.tags }}\` |" >> $GITHUB_STEP_SUMMARY
